# Deploy main → Cloudflare Pages project "jennian-iq-prod" under Haydon's business
# account (the old jennian-iq.pages.dev is an orphan under an inaccessible login).
# Creates the project on first run, binds GEOMETRY_API_KEY + ANTHROPIC_API_KEY as Pages
# SECRETS in the production env (re-put every deploy — see ROOT CAUSE note below), builds
# with the Supabase VITE vars inlined, deploys honestly (pipefail), gates on the geometry
# proxy AND on both runtime secrets being bound, publishes the outcome to ops-results.
# Secrets never echoed. A missing required repo secret fails the deploy at preflight —
# we do not ship builds whose runtime config is known-broken (lesson: ANTHROPIC_API_KEY
# was silently absent from prod for weeks; scale extraction's AI fallback was dead).
name: deploy-pages
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Preflight — required repo secrets
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCT: ${{ secrets.CF_ID_CANDIDATE_A }}
          GEOM: ${{ secrets.CF_EXTRA_64 }}
          ANTH: ${{ secrets.ANTHROPIC_API_KEY }}
          VSPK: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SBSV: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          missing=""
          [ -z "$CF" ]   && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "$ACCT" ] && missing="$missing CF_ID_CANDIDATE_A"
          [ -z "$GEOM" ] && missing="$missing CF_EXTRA_64(GEOMETRY_API_KEY)"
          [ -z "$ANTH" ] && missing="$missing ANTHROPIC_API_KEY"
          [ -z "$VSPK" ] && missing="$missing VITE_SUPABASE_PUBLISHABLE_KEY"
          [ -z "$SBSV" ] && missing="$missing SUPABASE_SECRET_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Deploy blocked — missing required repo secrets:$missing — add at Settings > Secrets and variables > Actions. Refusing to ship a build with known-broken runtime config."
            exit 1
          fi
          echo "All required secrets present."
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Ensure project exists + bind runtime secrets
        id: project
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCT: ${{ secrets.CF_ID_CANDIDATE_A }}
          GEOM: ${{ secrets.CF_EXTRA_64 }}
          ANTH: ${{ secrets.ANTHROPIC_API_KEY }}
          SB_SERVICE: ${{ secrets.SUPABASE_SECRET_KEY }}
          RESEND: ${{ secrets.RESEND_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ID_CANDIDATE_A }}
        run: |
          set +e
          : > /tmp/deploy.txt
          BODY=$(jq -n '{name:"jennian-iq-prod", production_branch:"main"}')
          curl -s -X POST -H "Authorization: Bearer $CF" -H "Content-Type: application/json" -d "$BODY" "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects" > /tmp/r.json
          echo "create: success=$(jq -r '.success' /tmp/r.json) errors=$(jq -c '[.errors[]? | .code]' /tmp/r.json)" >> /tmp/deploy.txt
          # ROOT CAUSE (11 Jun 2026): wrangler.jsonc has pages_build_output_dir, which puts the
          # project in wrangler-config-managed mode — project-level env_vars set via the REST API
          # are IGNORED on wrangler deploys (this is why three sessions of env PATCHes produced
          # 503 "Geometry API not configured"). The ONLY binding that survives is a Pages SECRET,
          # which `wrangler pages secret put` uploads. It persists across deployments — but any
          # REST PATCH that nulls env_vars deletes it too (secrets live in the same store), so
          # re-put it on every deploy. Idempotent and cheap. Same treatment for ANTHROPIC_API_KEY
          # (concept pipeline: scale extraction AI fallback, site plan, elevations — opus direct).
          echo "$GEOM" | npx wrangler pages secret put GEOMETRY_API_KEY --project-name=jennian-iq-prod >> /tmp/deploy.txt 2>&1
          echo "secret-put GEOMETRY_API_KEY exit: $?" >> /tmp/deploy.txt
          echo "$ANTH" | npx wrangler pages secret put ANTHROPIC_API_KEY --project-name=jennian-iq-prod >> /tmp/deploy.txt 2>&1
          echo "secret-put ANTHROPIC_API_KEY exit: $?" >> /tmp/deploy.txt
          # ── Invite path (11 Jun 2026): the sendInvitationFn server fn needs admin
          # Supabase creds + the public site base at RUNTIME. Same rule as geometry:
          # Pages SECRETS are the only binding that survives config-managed deploys,
          # so re-put them every time. SITE_URL is probed live — once www.jennianiq.nz
          # actually serves the app, invite links flip to it automatically; until
          # then they use the pages.dev host (route exists on both, nothing breaks).
          printf '%s' "https://ukegudqobnmiesudtjen.supabase.co" | npx wrangler pages secret put SUPABASE_URL --project-name=jennian-iq-prod >> /tmp/deploy.txt 2>&1
          echo "secret-put SUPABASE_URL exit: $?" >> /tmp/deploy.txt
          printf '%s' "$SB_SERVICE" | npx wrangler pages secret put SUPABASE_SERVICE_KEY --project-name=jennian-iq-prod >> /tmp/deploy.txt 2>&1
          echo "secret-put SUPABASE_SERVICE_KEY exit: $?" >> /tmp/deploy.txt
          WWW=$(curl -s -o /dev/null -w '%{http_code}' --max-time 12 "https://www.jennianiq.nz/version.json" || echo ERR)
          if [ "$WWW" = "200" ]; then SITE="https://www.jennianiq.nz"; else SITE="https://jennian-iq-prod.pages.dev"; fi
          echo "site-url probe: www=$WWW → SITE_URL=$SITE" >> /tmp/deploy.txt
          printf '%s' "$SITE" | npx wrangler pages secret put SITE_URL --project-name=jennian-iq-prod >> /tmp/deploy.txt 2>&1
          echo "secret-put SITE_URL exit: $?" >> /tmp/deploy.txt
          if [ -n "$RESEND" ]; then
            printf '%s' "$RESEND" | npx wrangler pages secret put RESEND_API_KEY --project-name=jennian-iq-prod >> /tmp/deploy.txt 2>&1
            echo "secret-put RESEND_API_KEY exit: $? (branded invite email ACTIVE)" >> /tmp/deploy.txt
          else
            echo "RESEND_API_KEY repo secret not set — invites fall back to Supabase's default template" >> /tmp/deploy.txt
          fi
          curl -s -H "Authorization: Bearer $CF" "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects/jennian-iq-prod" > /tmp/r.json
          jq -r '"subdomain: " + (.result.subdomain // "?")' /tmp/r.json >> /tmp/deploy.txt
      - name: Build (Supabase vars inlined)
        id: build
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: https://ukegudqobnmiesudtjen.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ukegudqobnmiesudtjen
          VITE_BUILD_ID: ${{ github.sha }}
        run: npx vite build && node scripts/cf-pages-postbuild.mjs
      - name: Deploy
        id: deploy
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ID_CANDIDATE_A }}
        run: |
          set -o pipefail
          # Binding strategy (verified live 11 Jun, twice): GEOMETRY_API_KEY is a Pages
          # SECRET (put in the earlier step) — the only binding that reaches wrangler
          # deploys in config-managed mode. A runner-generated wrangler.toml was tried
          # and CRASHES wrangler 4.x next to the repo's wrangler.jsonc (dual config).
          # The post-deploy gates below are the proof either way.
          npx wrangler pages deploy dist/client --project-name=jennian-iq-prod --branch=main 2>&1 | tee /tmp/wr.log | tail -4 >> /tmp/deploy.txt
          echo "── wrangler log (vars/secret/warn lines) ──" >> /tmp/deploy.txt
          grep -in "toml\|vars\|binding\|warn\|ignor\|error" /tmp/wr.log >> /tmp/deploy.txt || echo "(no matches)" >> /tmp/deploy.txt
      - name: Verify geometry proxy (post-deploy gate)
        run: |
          sleep 8
          CODE=$(curl -s -o /tmp/gbody -w '%{http_code}' --max-time 20 "https://jennian-iq-prod.pages.dev/api/geometry/health" || echo ERR)
          echo "geometry-proxy: $CODE $(head -c 100 /tmp/gbody)" >> /tmp/deploy.txt
          [ "$CODE" = "200" ] || { echo "GEOMETRY PROXY UNHEALTHY ($CODE) — failing the deploy gate" >> /tmp/deploy.txt; exit 1; }
      - name: Verify runtime secrets bound (post-deploy gate)
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCT: ${{ secrets.CF_ID_CANDIDATE_A }}
          RESEND: ${{ secrets.RESEND_API_KEY }}
        run: |
          curl -s -H "Authorization: Bearer $CF" "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects/jennian-iq-prod" > /tmp/p.json
          ok=1
          for S in GEOMETRY_API_KEY ANTHROPIC_API_KEY SUPABASE_URL SUPABASE_SERVICE_KEY SITE_URL; do
            if grep -q "\"$S\"" /tmp/p.json; then
              echo "binding $S: present" >> /tmp/deploy.txt
            else
              echo "binding $S: MISSING from project config" >> /tmp/deploy.txt; ok=0
            fi
          done
          if [ -n "$RESEND" ]; then
            if grep -q '"RESEND_API_KEY"' /tmp/p.json; then echo "binding RESEND_API_KEY: present" >> /tmp/deploy.txt; else echo "binding RESEND_API_KEY: MISSING (repo secret exists but not bound)" >> /tmp/deploy.txt; ok=0; fi
          else
            echo "binding RESEND_API_KEY: skipped (repo secret not set — default-template fallback)" >> /tmp/deploy.txt
          fi
          [ "$ok" = "1" ] || { echo "RUNTIME SECRET BINDING MISSING — failing the deploy gate" >> /tmp/deploy.txt; exit 1; }
      - name: Publish status (always)
        if: always()
        run: |
          echo "build: ${{ steps.build.outcome }} | deploy: ${{ steps.deploy.outcome }}" >> /tmp/deploy.txt
          git config user.name "ops[bot]"; git config user.email "noreply@github.com"
          git checkout --orphan ops-results && { git rm -rf -q . || true; }
          mkdir -p results && cp /tmp/deploy.txt results/deploy.txt
          git add results && git commit -q -m "deploy-pages ${{ github.run_id }}"
          git push -f origin ops-results
      - name: Propagate
        if: steps.deploy.outcome != 'success'
        run: exit 1
