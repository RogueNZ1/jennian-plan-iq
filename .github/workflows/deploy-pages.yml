# Deploy main → Cloudflare Pages project "jennian-iq-prod" under Haydon's business
# account (the old jennian-iq.pages.dev is an orphan under an inaccessible login).
# Creates the project on first run with GEOMETRY_API_KEY in the production env, builds
# with the Supabase VITE vars inlined, deploys honestly (pipefail), publishes the
# subdomain + outcome to ops-results. Secrets never echoed.
name: deploy-pages
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Ensure project exists + bind geometry secret
        id: project
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCT: ${{ secrets.CF_ID_CANDIDATE_A }}
          GEOM: ${{ secrets.CF_EXTRA_64 }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ID_CANDIDATE_A }}
        run: |
          set +e
          : > /tmp/deploy.txt
          BODY=$(jq -n '{name:"jennian-iq-prod", production_branch:"main"}')
          curl -s -X POST -H "Authorization: Bearer $CF" -H "Content-Type: application/json" -d "$BODY" "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects" > /tmp/r.json
          echo "create: success=$(jq -r '.success' /tmp/r.json) errors=$(jq -c '[.errors[]? | .code]' /tmp/r.json)" >> /tmp/deploy.txt
          # ROOT CAUSE (11 Jun 2026): wrangler.jsonc has pages_build_output_dir, which puts the
          # project in wrangler-config-managed mode — project-level env_vars set via the REST API
          # are IGNORED on wrangler deploys (this is why three sessions of env PATCHes produced
          # 503 "Geometry API not configured"). The ONLY binding that survives is a Pages SECRET,
          # which `wrangler pages secret put` uploads. It persists across deployments — but any
          # REST PATCH that nulls env_vars deletes it too (secrets live in the same store), so
          # re-put it on every deploy. Idempotent and cheap.
          echo "$GEOM" | npx wrangler pages secret put GEOMETRY_API_KEY --project-name=jennian-iq-prod >> /tmp/deploy.txt 2>&1
          echo "secret-put exit: $?" >> /tmp/deploy.txt
          curl -s -H "Authorization: Bearer $CF" "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects/jennian-iq-prod" > /tmp/r.json
          jq -r '"subdomain: " + (.result.subdomain // "?")' /tmp/r.json >> /tmp/deploy.txt
      - name: Build (Supabase vars inlined)
        id: build
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: https://ukegudqobnmiesudtjen.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ukegudqobnmiesudtjen
          VITE_BUILD_ID: ${{ github.sha }}
        run: npx vite build && node scripts/cf-pages-postbuild.mjs
      - name: Deploy
        id: deploy
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ID_CANDIDATE_A }}
        run: |
          set -o pipefail
          # Binding strategy (verified live 11 Jun, twice): GEOMETRY_API_KEY is a Pages
          # SECRET (put in the earlier step) — the only binding that reaches wrangler
          # deploys in config-managed mode. A runner-generated wrangler.toml was tried
          # and CRASHES wrangler 4.x next to the repo's wrangler.jsonc (dual config).
          # The post-deploy gate below is the proof either way.
          npx wrangler pages deploy dist/client --project-name=jennian-iq-prod --branch=main 2>&1 | tee /tmp/wr.log | tail -4 >> /tmp/deploy.txt
          echo "── wrangler log (vars/secret/warn lines) ──" >> /tmp/deploy.txt
          grep -in "toml\|vars\|binding\|warn\|ignor\|error" /tmp/wr.log >> /tmp/deploy.txt || echo "(no matches)" >> /tmp/deploy.txt
      - name: Verify geometry proxy (post-deploy gate)
        run: |
          sleep 8
          CODE=$(curl -s -o /tmp/gbody -w '%{http_code}' --max-time 20 "https://jennian-iq-prod.pages.dev/api/geometry/health" || echo ERR)
          echo "geometry-proxy: $CODE $(head -c 100 /tmp/gbody)" >> /tmp/deploy.txt
          [ "$CODE" = "200" ] || { echo "GEOMETRY PROXY UNHEALTHY ($CODE) — failing the deploy gate" >> /tmp/deploy.txt; exit 1; }
      - name: Publish status (always)
        if: always()
        run: |
          echo "build: ${{ steps.build.outcome }} | deploy: ${{ steps.deploy.outcome }}" >> /tmp/deploy.txt
          git config user.name "ops[bot]"; git config user.email "noreply@github.com"
          git checkout --orphan ops-results && { git rm -rf -q . || true; }
          mkdir -p results && cp /tmp/deploy.txt results/deploy.txt
          git add results && git commit -q -m "deploy-pages ${{ github.run_id }}"
          git push -f origin ops-results
      - name: Propagate
        if: steps.deploy.outcome != 'success'
        run: exit 1
