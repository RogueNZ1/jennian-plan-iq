# Deep Cloudflare diagnostic: token verify + pages project list under BOTH candidate
# account ids, with raw success flags and error codes (never bodies that could leak).
name: cf-verify
on:
  push:
    branches: [convergence]
    paths: ['.github/workflows/cf-verify.yml']
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          A: ${{ secrets.CF_ID_CANDIDATE_A }}
          B: ${{ secrets.CF_ID_CANDIDATE_B }}
        run: |
          set +e
          O=/tmp/v.txt; : > $O
          q() { curl -s -H "Authorization: Bearer $CF" "$1" > /tmp/r.json; echo "$2 success=$(jq -r '.success' /tmp/r.json) errors=$(jq -c '[.errors[]? | {code, message}]' /tmp/r.json)" >> $O; }
          q "https://api.cloudflare.com/client/v4/user/tokens/verify" "token-verify:"
          jq -r '"token status: " + (.result.status // "?")' /tmp/r.json >> $O
          q "https://api.cloudflare.com/client/v4/accounts" "accounts-list:"
          jq -r '.result[]? | "account: \(.id[0:8])… \(.name)"' /tmp/r.json >> $O
          q "https://api.cloudflare.com/client/v4/accounts/$A/pages/projects" "pages-list(A):"
          jq -r '.result[]? | "project(A): \(.name) → \(.subdomain)"' /tmp/r.json >> $O
          q "https://api.cloudflare.com/client/v4/accounts/$B/pages/projects" "pages-list(B):"
          jq -r '.result[]? | "project(B): \(.name) → \(.subdomain)"' /tmp/r.json >> $O
          git config user.name "ops[bot]"; git config user.email "noreply@github.com"
          git checkout --orphan ops-results && { git rm -rf -q . || true; }
          mkdir -p results && cp $O results/cf-diag.txt
          git add results && git commit -q -m "cf-diag ${{ github.run_id }}" && git push -f origin ops-results
