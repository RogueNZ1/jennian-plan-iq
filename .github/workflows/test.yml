# Jennian IQ — test gate. Every push and PR runs the full offline suite
# (483 tests at time of writing): export faithfulness, takeoff derivation,
# goldens gate, regression locks. A red run here means a QS export defect
# would have shipped — do not merge red.
name: tests
on:
  push:
    branches: [main, convergence]
  pull_request:
jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Gate order: cheapest signal first. tsc and eslint were invisible to CI
      # until 13 Jun 2026 (66 latent type errors sailed through) — now they gate.
      # eslint exits 0 on warnings (7 grandfathered), 1 on any error.
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npx vitest run
