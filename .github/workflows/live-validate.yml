# LIVE validation — runs the real export pipeline against the real Supabase project.
# Triggered via workflow_dispatch. Requires repo secret SUPABASE_SECRET_KEY.
# The project URL is auto-discovered by probing the known candidate projects with the
# key (a wrong project simply rejects the key). Every live value is printed before it
# is asserted, so a red run reads as a report.
name: live-validate
on:
  workflow_dispatch:
jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Discover Supabase project URL
        id: discover
        env:
          KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          for ref in vcufpzokvdsvuqrcficq ukegudqobnmiesudtjen; do
            url="https://${ref}.supabase.co"
            code=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $KEY" -H "Authorization: Bearer $KEY" "$url/rest/v1/jobs?select=id&limit=1")
            echo "$url -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "url=$url" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "::error::No candidate Supabase project accepted the key — need the project URL"
          exit 1
      - name: Run live validation suite
        env:
          LIVE_VALIDATE: "1"
          SUPABASE_URL: ${{ steps.discover.outputs.url }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npx vitest run -c vitest.live.config.ts
