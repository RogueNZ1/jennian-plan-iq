# LIVE validation — runs the real export pipeline against the real Supabase project.
# Results are pushed to the 'live-results' branch (results/last-run.txt) so they are
# readable via raw.githubusercontent.com — the Actions log blobs are not reachable
# from the build sandbox. Requires secrets SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY.
name: live-validate
on:
  workflow_dispatch:
  push:
    branches: [convergence]
    paths:
      - '.github/workflows/live-validate.yml'
      - 'tests/live/**'
      - 'vitest.live.config.ts'
permissions:
  contents: write
jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run live validation suite
        id: live
        continue-on-error: true
        env:
          LIVE_VALIDATE: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx vitest run -c vitest.live.config.ts 2>&1 | tee /tmp/live-out.txt
      - name: Publish results to live-results branch
        run: |
          git config user.name "live-validate[bot]"
          git config user.email "noreply@github.com"
          git checkout --orphan live-results
          git rm -rf -q . || true
          mkdir -p results
          cp /tmp/live-out.txt results/last-run.txt
          echo "run: ${{ github.run_id }} sha: ${{ github.sha }} outcome: ${{ steps.live.outcome }}" > results/meta.txt
          git add results && git commit -q -m "live-validate run ${{ github.run_id }}"
          git push -f origin live-results
      - name: Propagate suite outcome
        if: steps.live.outcome == 'failure'
        run: exit 1
