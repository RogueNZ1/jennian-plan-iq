name: 007 Intelligence Brief

on:
  schedule:
    - cron: "0 10 * * 0,3"   # Sun & Wed 10:00 UTC = 10pm NZST (11pm during daylight saving)
  workflow_dispatch:           # manual "Run workflow" button for testing

permissions:
  contents: write              # lets the run publish its log to the ops-results branch

concurrency:
  group: 007-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: https://ukegudqobnmiesudtjen.supabase.co
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: jennian-007-scraper/requirements.txt

      - name: Install system deps (Ubuntu 24 chromium prerequisites)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libasound2t64 libgbm1 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 libcairo2 libasound2t64

      - name: Install dependencies
        working-directory: jennian-007-scraper
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run 007
        working-directory: jennian-007-scraper
        run: python run_brief.py

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: 007-run-${{ github.run_id }}
          path: jennian-007-scraper/logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Publish run record to ops-results
        if: always()
        run: |
          STAMP=$(date -u +%Y-%m-%dT%H%MZ)
          mkdir -p /tmp/ops && cd /tmp/ops
          git init -q
          git config user.name "jennian-007"
          git config user.email "007@jennian-iq.local"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch -q origin ops-results:ops-results 2>/dev/null && git checkout -q ops-results || git checkout -q --orphan ops-results
          mkdir -p "007/$STAMP"
          cp "$GITHUB_WORKSPACE"/jennian-007-scraper/logs/* "007/$STAMP/" 2>/dev/null || true
          git add -A
          git commit -q -m "007 run $STAMP (${{ job.status }})" || exit 0
          git push -q origin ops-results

      - name: Failure alert email
        if: failure()
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"007 Intel <intel@jennian.co.nz>\",\"to\":\"haydon.christian@jennian.co.nz\",\"subject\":\"007 run FAILED\",\"text\":\"The scheduled 007 run failed — no brief this cycle.\\n\\nLogs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            || echo "Failure alert could not be sent"
