# One-shot, idempotent: create the claude-validator app account (auth user + estimator
# role) via the Supabase admin API. Credentials live ONLY in GitHub secrets. Status —
# success OR failure — always publishes to the ops-results branch (results/provision.txt).
name: provision-validator
on:
  push:
    branches: [convergence]
    paths: ['.github/workflows/provision-validator.yml']
permissions:
  contents: write
jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Create user + role (idempotent)
        id: create
        continue-on-error: true
        env:
          KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          EMAIL: ${{ secrets.VALIDATOR_EMAIL }}
          PASSWORD: ${{ secrets.VALIDATOR_PASSWORD }}
        run: |
          set -e
          URL="https://ukegudqobnmiesudtjen.supabase.co"
          UID=$(curl -sf -H "apikey: $KEY" -H "Authorization: Bearer $KEY" "$URL/auth/v1/admin/users?per_page=200" | jq -r --arg e "$EMAIL" '.users[] | select(.email==$e) | .id' | head -1)
          if [ -z "$UID" ]; then
            UID=$(curl -sf -X POST -H "apikey: $KEY" -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\",\"email_confirm\":true}" "$URL/auth/v1/admin/users" | jq -r '.id // empty')
            echo "created user ${UID:0:8}" | tee /tmp/ops.txt
          else
            curl -sf -X PUT -H "apikey: $KEY" -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" -d "{\"password\":\"$PASSWORD\"}" "$URL/auth/v1/admin/users/$UID" > /dev/null
            echo "user exists ${UID:0:8} password synced" | tee /tmp/ops.txt
          fi
          test -n "$UID"
          curl -s -X POST -H "apikey: $KEY" -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" -H "Prefer: resolution=ignore-duplicates" -d "[{\"user_id\":\"$UID\",\"role\":\"estimator\"}]" "$URL/rest/v1/user_roles" -o /dev/null -w "role grant HTTP %{http_code}\n" | tee -a /tmp/ops.txt
          curl -sf -H "apikey: $KEY" -H "Authorization: Bearer $KEY" "$URL/rest/v1/user_roles?user_id=eq.$UID&select=role" | tee -a /tmp/ops.txt
      - name: Publish status (always)
        if: always()
        run: |
          [ -f /tmp/ops.txt ] || echo "create step produced no output — failed before first call (outcome: ${{ steps.create.outcome }})" > /tmp/ops.txt
          echo "outcome: ${{ steps.create.outcome }}" >> /tmp/ops.txt
          git config user.name "ops[bot]"; git config user.email "noreply@github.com"
          git checkout --orphan ops-results && { git rm -rf -q . || true; }
          mkdir -p results && cp /tmp/ops.txt results/provision.txt
          git add results && git commit -q -m "provision-validator run ${{ github.run_id }}"
          git push -f origin ops-results
      - name: Propagate
        if: steps.create.outcome != 'success'
        run: exit 1
