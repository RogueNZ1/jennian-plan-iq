# One-shot, idempotent: create the claude-validator app account (auth user + estimator
# role) via the Supabase admin API. Credentials live ONLY in GitHub secrets. Status —
# success OR failure — always publishes to the ops-results branch (results/provision.txt).
name: provision-validator
on:
  push:
    branches: [convergence]
    paths: ['.github/workflows/provision-validator.yml']
permissions:
  contents: write
jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create user + role (idempotent)
        id: create
        continue-on-error: true
        env:
          KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          EMAIL: ${{ secrets.VALIDATOR_EMAIL }}
          PASSWORD: ${{ secrets.VALIDATOR_PASSWORD }}
        run: |
          set +e
          set +o pipefail
          URL="https://ukegudqobnmiesudtjen.supabase.co"
          A() { curl -s -o /tmp/r.json -w "%{http_code}" -H "apikey: $KEY" -H "Authorization: Bearer $KEY" "$@"; }
          : > /tmp/ops.txt
          C=$(A "$URL/auth/v1/admin/users?per_page=200"); echo "admin list HTTP $C" >> /tmp/ops.txt
          echo "shape: $(jq -c 'if type=="object" then keys else type end' /tmp/r.json 2>&1)" >> /tmp/ops.txt
          echo "users len: $(jq -r '.users | length' /tmp/r.json 2>&1)" >> /tmp/ops.txt
          echo "first id: $(jq -r '.users[0].id // "none"' /tmp/r.json 2>&1 | cut -c1-13)" >> /tmp/ops.txt
          USER_ID=$(jq -r --arg e "$EMAIL" '.users[]? | select(.email==$e) | .id' /tmp/r.json 2>>/tmp/ops.txt | head -1)
          echo "lookup uid: [${USER_ID:0:8}] (jq rc=$?)" >> /tmp/ops.txt
          if [ -z "$USER_ID" ]; then
            C=$(A -X POST -H "Content-Type: application/json" -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\",\"email_confirm\":true}" "$URL/auth/v1/admin/users")
            echo "admin create HTTP $C" >> /tmp/ops.txt
            jq -r '.msg // .message // .error_description // .error // "ok"' /tmp/r.json >> /tmp/ops.txt 2>&1
            USER_ID=$(jq -r '.id // empty' /tmp/r.json 2>>/tmp/ops.txt)
          else
            C=$(A -X PUT -H "Content-Type: application/json" -d "{\"password\":\"$PASSWORD\"}" "$URL/auth/v1/admin/users/$USER_ID")
            echo "admin pw-sync HTTP $C (user existed)" >> /tmp/ops.txt
          fi
          echo "uid: [${USER_ID:0:8}]" >> /tmp/ops.txt
          if [ -z "$USER_ID" ]; then echo "FAILED: no uid" >> /tmp/ops.txt; exit 1; fi
          C=$(A -X POST -H "Content-Type: application/json" -H "Prefer: resolution=ignore-duplicates" -d "[{\"user_id\":\"$USER_ID\",\"role\":\"estimator\"}]" "$URL/rest/v1/user_roles")
          echo "role grant HTTP $C" >> /tmp/ops.txt
          A "$URL/rest/v1/user_roles?user_id=eq.$USER_ID&select=role" > /dev/null
          echo "roles: $(cat /tmp/r.json)" >> /tmp/ops.txt
          exit 0
      - name: Publish status (always)
        if: always()
        run: |
          [ -f /tmp/ops.txt ] || echo "create step produced no output — failed before first call (outcome: ${{ steps.create.outcome }})" > /tmp/ops.txt
          echo "outcome: ${{ steps.create.outcome }}" >> /tmp/ops.txt
          git config user.name "ops[bot]"; git config user.email "noreply@github.com"
          git checkout --orphan ops-results && { git rm -rf -q . || true; }
          mkdir -p results && cp /tmp/ops.txt results/provision.txt
          git add results && git commit -q -m "provision-validator run ${{ github.run_id }}"
          git push -f origin ops-results
      - name: Propagate
        if: steps.create.outcome != 'success'
        run: exit 1
