# Three-way probe of the geometry pipeline:
#   A) prod proxy  (pages.dev/api/geometry/health)  — what the app experiences
#   B) Railway direct, NO key                        — is the service up + auth-gated?
#   C) Railway direct, WITH our GEOMETRY_API_KEY     — is OUR key actually valid?
# Verdict matrix: A fail + B 401 + C 200  → proxy env wrong (Pages project env)
#                 A fail + B 401 + C 401  → CF_EXTRA_64 is NOT the geometry key
#                 B unreachable           → Railway service down/cold
name: geometry-probe
on:
  push:
    branches: [convergence]
    paths: ['.github/workflows/geometry-probe.yml']
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set GEOMETRY_API_KEY on the Pages project + validate the key
        env:
          KEY: ${{ secrets.CF_EXTRA_64 }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACC: ${{ secrets.CF_ID_CANDIDATE_A }}
        run: |
          O=/tmp/probe.txt; : > $O
          # 1) key validity against a REAL authenticated endpoint (health is open)
          for ARGS in "" "-H X-API-Key:$KEY"; do
            CODE=$(curl -s -o /tmp/body -w '%{http_code}' --max-time 25 -X POST $ARGS \
              "https://jennian-iq-geometry-api-production.up.railway.app/measure" \
              -F "file=@README.md;type=application/pdf" -F "page=0" || echo ERR)
            TAG=$([ -z "$ARGS" ] && echo nokey || echo withkey)
            echo "[measure-$TAG] $CODE $(head -c 140 /tmp/body | tr '\n' ' ')" >> $O
          done
          # 2) set the env var on the Pages project (production deployment config)
          CODE=$(curl -s -o /tmp/body -w '%{http_code}' -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACC/pages/projects/jennian-iq-prod" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            --data "{\"deployment_configs\":{\"production\":{\"env_vars\":{\"GEOMETRY_API_KEY\":{\"type\":\"secret_text\",\"value\":\"$KEY\"}}}}}")
          echo "[pages-env-set] $CODE $(head -c 200 /tmp/body | tr '\n' ' ')" >> $O
          cat $O
      - name: Publish
        if: always()
        run: |
          git config user.name "ops[bot]"; git config user.email "noreply@github.com"
          git checkout --orphan ops-results && { git rm -rf -q . || true; }
          mkdir -p results && cp /tmp/probe.txt results/geometry-probe.txt
          git add results && git commit -q -m "geometry-probe ${{ github.run_id }}" && git push -f origin ops-results
