# Three-way probe of the geometry pipeline:
#   A) prod proxy  (pages.dev/api/geometry/health)  — what the app experiences
#   B) Railway direct, NO key                        — is the service up + auth-gated?
#   C) Railway direct, WITH our GEOMETRY_API_KEY     — is OUR key actually valid?
# Verdict matrix: A fail + B 401 + C 200  → proxy env wrong (Pages project env)
#                 A fail + B 401 + C 401  → CF_EXTRA_64 is NOT the geometry key
#                 B unreachable           → Railway service down/cold
name: geometry-probe
on:
  push:
    branches: [convergence]
    paths: ['.github/workflows/geometry-probe.yml']
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Inspect project config + deployments
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACC: ${{ secrets.CF_ID_CANDIDATE_A }}
        run: |
          O=/tmp/probe.txt; : > $O
          curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACC/pages/projects/jennian-iq-prod" \
            | python3 -c "
          import json,sys
          p=json.load(sys.stdin)['result']
          print('production_branch:', p.get('production_branch'))
          for envk in ('production','preview'):
              ev=(p.get('deployment_configs') or {}).get(envk,{}).get('env_vars') or {}
              print(f'{envk} env keys:', sorted(ev.keys()))
          " >> $O 2>&1
          curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACC/pages/projects/jennian-iq-prod/deployments?per_page=4" \
            | python3 -c "
          import json,sys
          for d in json.load(sys.stdin)['result'][:4]:
              print('deploy:', d.get('environment'), '| branch', (d.get('deployment_trigger') or {}).get('metadata',{}).get('branch'), '|', d.get('created_on'), '|', d.get('id')[:8])
          " >> $O 2>&1
          cat $O
      - name: Publish
        if: always()
        run: |
          git config user.name "ops[bot]"; git config user.email "noreply@github.com"
          git checkout --orphan ops-results && { git rm -rf -q . || true; }
          mkdir -p results && cp /tmp/probe.txt results/geometry-probe.txt
          git add results && git commit -q -m "geometry-probe ${{ github.run_id }}" && git push -f origin ops-results
