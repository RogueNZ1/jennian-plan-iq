# Jennian IQ — secret scan (audit finding C2, 13 Jun 2026).
# Three credentials have been exposed in chat sessions; this gate makes sure the
# repo itself can never join them. Gitleaks scans the FULL history on every push
# and PR — a committed key fails the pipeline before it can deploy. Binary is
# version-pinned and checksum-free by design simplicity; bump deliberately.
name: secret-scan
on:
  push:
    branches: [main, convergence]
  pull_request:
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history — a leak buried ten commits deep still fails
      - name: Run gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks detect --no-banner --redact -v
