# Door-engine bench, SELF-FETCHING: finds the Alexandra plan in Supabase storage
# (uploaded_files → job-files bucket), downloads it, runs the hand-counted ground-truth
# gate (12 hinged / 4 double / 1 cavity, entry+garage excluded, zero extras). Publishes
# to ops-results (results/doors-bench.txt). PII-safe: prints file IDs + masked names.
name: doors-bench
on:
  push:
    branches: [convergence]
    paths:
      - '.github/workflows/doors-bench.yml'
      - 'src/lib/doors/**'
      - 'tests/doors/**'
permissions:
  contents: write
jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Find + download the Alexandra plan from storage
        id: fetch
        env:
          KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          set +e
          URL="https://ukegudqobnmiesudtjen.supabase.co"
          H1="apikey: $KEY"; H2="Authorization: Bearer $KEY"
          : > /tmp/bench.txt
          # Anchor on the JOB first: alexandra client or kanzan address.
          JOBS=$(curl -s -H "$H1" -H "$H2" "$URL/rest/v1/jobs?select=id,client_name,address&or=(client_name.ilike.%25alexandra%25,address.ilike.%25kanzan%25)&limit=5")
          echo "candidate jobs: $(echo "$JOBS" | jq -r '[.[] | (.client_name[0:3] + "…/" + (.address[0:10] // "") + "…")] | join(", ")')" >> /tmp/bench.txt
          IDS=$(echo "$JOBS" | jq -r '[.[].id] | join(",")')
          ROWS="[]"
          if [ -n "$IDS" ]; then
            ROWS=$(curl -s -H "$H1" -H "$H2" "$URL/rest/v1/uploaded_files?select=file_name,storage_url&job_id=in.($IDS)&file_name=ilike.%25floorplan%25&limit=10")
          fi
          if [ "$(echo "$ROWS" | jq 'length')" = "0" ]; then
            echo "no floorplan on those jobs — falling back to any 03[._-]18-named floorplan" >> /tmp/bench.txt
            ROWS=$(curl -s -H "$H1" -H "$H2" "$URL/rest/v1/uploaded_files?select=file_name,storage_url&file_name=ilike.%25floorplan%25&limit=40")
            ROWS=$(echo "$ROWS" | jq '[.[] | select(.file_name | test("03[._-]18"))]')
          fi
          echo "candidate files: $(echo "$ROWS" | jq 'length')" >> /tmp/bench.txt
          PICK=$(echo "$ROWS" | jq -r '.[0].storage_url // empty')
          echo "picked: $(echo "$ROWS" | jq -r '.[0].file_name // "none" | .[0:18]')… path-shape: $(echo "$PICK" | cut -c1-12)…" >> /tmp/bench.txt
          if [ -z "$PICK" ]; then echo "NO candidate plan found" >> /tmp/bench.txt; echo "found=" >> "$GITHUB_OUTPUT"; exit 0; fi
          ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe='/'))" "$PICK")
          for B in job-files plan_pdfs; do
            curl -s -H "$H1" -H "$H2" -o /tmp/plan.pdf "$URL/storage/v1/object/$B/$ENC"
            SZ=$(stat -c%s /tmp/plan.pdf 2>/dev/null || echo 0)
            echo "bucket $B → $SZ bytes" >> /tmp/bench.txt
            [ "$SZ" -gt 10000 ] && break
          done
          if [ "$SZ" -lt 10000 ]; then head -c 200 /tmp/plan.pdf >> /tmp/bench.txt; echo "found=" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "found=1" >> "$GITHUB_OUTPUT"
      - name: Run the ground-truth bench
        id: bench
        if: steps.fetch.outputs.found == '1'
        continue-on-error: true
        run: |
          set -o pipefail
          npx tsx tests/doors/run-bench.ts /tmp/plan.pdf tests/doors/alexandra.bench.json 2>&1 | tee -a /tmp/bench.txt
      - name: Publish (always)
        if: always()
        run: |
          echo "fetch: ${{ steps.fetch.outcome }} | bench: ${{ steps.bench.outcome }}" >> /tmp/bench.txt
          git config user.name "ops[bot]"; git config user.email "noreply@github.com"
          git checkout --orphan ops-results && { git rm -rf -q . || true; }
          mkdir -p results && cp /tmp/bench.txt results/doors-bench.txt
          git add results && git commit -q -m "doors-bench ${{ github.run_id }}" && git push -f origin ops-results
      - name: Propagate
        if: steps.fetch.outputs.found == '1' && steps.bench.outcome != 'success'
        run: exit 1
